<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#0f0e0b"/>
  <!-- Full-width image placeholder -->
  <rect x="0" y="40" width="480" height="240" fill="#1a1814"/>
  <!-- Image grid pattern -->
  <line x1="160" y1="40" x2="160" y2="280" stroke="#242019" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="280" stroke="#242019" stroke-width="1"/>
  <line x1="0" y1="120" x2="480" y2="120" stroke="#242019" stroke-width="1"/>
  <line x1="0" y1="200" x2="480" y2="200" stroke="#242019" stroke-width="1"/>
  <!-- Image icon -->
  <rect x="210" y="140" width="60" height="40" rx="3" fill="#242019" stroke="#4a5e3a" stroke-width="1.5" stroke-dasharray="4"/>
  <circle cx="224" cy="155" r="5" fill="#4a5e3a" opacity="0.5"/>
  <polyline points="210,175 228,158 245,170 258,162 270,175" fill="none" stroke="#4a5e3a" stroke-width="1.5" opacity="0.5"/>
  <!-- Caption bar -->
  <rect x="0" y="255" width="480" height="25" fill="#000" opacity="0.6"/>
  <rect x="16" y="262" width="120" height="9" rx="2" fill="#fff" opacity="0.6"/>
  <text x="24" y="308" font-family="sans-serif" font-size="11" fill="#4a5e3a" opacity="0.8">🖼️ Banner Imagine</text>
</svg>
