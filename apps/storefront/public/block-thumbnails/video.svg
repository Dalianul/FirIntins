<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#0f0e0b"/>
  <!-- Heading -->
  <rect x="160" y="20" width="160" height="12" rx="2" fill="#faf8f3" opacity="0.7"/>
  <!-- Video player -->
  <rect x="60" y="44" width="360" height="210" rx="4" fill="#1a1814"/>
  <!-- Progress bar area -->
  <rect x="60" y="232" width="360" height="22" rx="0 0 4 4" fill="#0f0e0b" opacity="0.8"/>
  <rect x="72" y="240" width="240" height="4" rx="2" fill="#242019"/>
  <rect x="72" y="240" width="80" height="4" rx="2" fill="#4a5e3a"/>
  <!-- Play button -->
  <circle cx="240" cy="149" r="32" fill="#000" opacity="0.5"/>
  <polygon points="228,136 228,162 260,149" fill="#fff" opacity="0.9"/>
  <!-- Caption -->
  <rect x="160" y="264" width="160" height="8" rx="2" fill="#c4bfb0" opacity="0.4"/>
  <text x="24" y="308" font-family="sans-serif" font-size="11" fill="#4a5e3a" opacity="0.8">🎬 Video</text>
</svg>
